apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-booking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-booking-app
  template:
    metadata:
      labels:
        app: ticket-booking-app
    spec:
      containers:
      - name: ticket-booking-app
        image: your-nexus-ip:8082/ticket-booking-app:v1
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-booking-service
spec:
  selector:
    app: ticket-booking-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort